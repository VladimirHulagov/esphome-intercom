# =============================================================================
# GENERIC ESP32-S3 INTERCOM -- Intercom only (no VA, no MWW)
# =============================================================================
# Uses intercom_api with AEC for full-duplex echo-cancelled calls.
# Speaker direct (no mixer, no resamplers) -- same proven path as s3-mini.
#
# WIP: ringtone not yet implemented (requires mixer or speaker sharing fix)
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM
#   - Microphone: Any I2S MEMS (INMP441, MSM261, SPH0645)
#   - Speaker: Any I2S amplifier (MAX98357A, NS4168, PCM5102A)
#   - LED: SK6812/WS2812 RGB (optional)
#
# GPIO PINOUT (example, change to match your wiring):
#   Microphone I2S bus:  WS=GPIO37, SCK=GPIO36, SD=GPIO35
#   Speaker I2S bus:     LRC=GPIO6, BCLK=GPIO5, DIN=GPIO7
#   LED:                 DATA=GPIO33
#
# =============================================================================

substitutions:
  name: generic-esp32-s3
  friendly_name: Generic Esp32-s3

# =============================================================================
# Package: shared intercom state machine
# =============================================================================
packages:
  core: !include packages/intercom_only.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: quad
  speed: 80MHz

preferences:
  flash_write_interval: 5min

api:
  on_client_connected:
    - lambda: |-
        static bool published = false;
        if (!published) {
          published = true;
          id(intercom).publish_entity_states();
        }

ota:
  - platform: esphome

logger:
  hardware_uart: USB_CDC
  level: INFO
  logs:
    intercom_api: INFO

network:
  enable_high_performance: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: git
      url: https://github.com/n-IA-hane/esphome-intercom
      ref: main
    components: [intercom_api, esp_aec]

# =============================================================================
# I2S Audio Buses (dual-bus: separate mic + speaker)
# =============================================================================
i2s_audio:
  - id: i2s_mic_bus
    i2s_lrclk_pin: GPIO37
    i2s_bclk_pin: GPIO36
  - id: i2s_spk_bus
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO5

# =============================================================================
# Microphone
# =============================================================================
microphone:
  - platform: i2s_audio
    id: mic_main
    i2s_audio_id: i2s_mic_bus
    i2s_din_pin: GPIO35
    adc_type: external
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    channel: left

# =============================================================================
# Speaker (direct -- no mixer)
# =============================================================================
speaker:
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_spk_bus
    i2s_dout_pin: GPIO7
    dac_type: external
    i2s_mode: primary
    sample_rate: 16000
    bits_per_sample: 16bit
    timeout: never
    buffer_duration: 100ms

# =============================================================================
# AEC
# =============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 8
  mode: voip_high_perf

# =============================================================================
# Intercom API -- Device part (merged with package callbacks)
# =============================================================================
intercom_api:
  mode: full
  microphone: mic_main
  speaker: hw_speaker
  dc_offset_removal: true
  aec_id: aec_processor
  aec_reference_delay_ms: 80
  ringing_timeout: 30s

# =============================================================================
# Switches (device-specific)
# =============================================================================
switch:
  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: Auto Answer
      icon: mdi:phone-in-talk
      restore_mode: RESTORE_DEFAULT_OFF
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON

# =============================================================================
# AEC Mode Select
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    options:
      - "sr_low_cost"
      - "sr_high_perf"
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "voip_high_perf"
    optimistic: true
    restore_value: true
    set_action:
      - if:
          condition:
            not:
              intercom_api.is_idle: intercom
          then:
            - logger.log:
                level: WARN
                format: "Cannot switch AEC mode during active intercom call"
          else:
            - logger.log:
                format: "Switching AEC mode to %s"
                args: ['x.c_str()']
            - esp_aec.set_mode:
                id: aec_processor
                mode: !lambda 'return x;'

# =============================================================================
# Numbers
# =============================================================================
number:
  - platform: intercom_api
    intercom_api_id: intercom
    speaker_volume:
      id: speaker_volume
      name: Speaker Volume
    mic_gain:
      id: mic_gain
      name: Mic Gain

# =============================================================================
# Status LED
# =============================================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: Status LED
    icon: mdi:led-on
    pin: GPIO33
    chipset: SK6812
    num_leds: 1
    rgb_order: GRB
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - strobe:
          name: "Ringing"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
            - state: false
              duration: 250ms
      - strobe:
          name: "Calling"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 50%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms

# =============================================================================
# Diagnostics
# =============================================================================
sensor:
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: Uptime
    update_interval: 60s
    entity_category: diagnostic

  - platform: internal_temperature
    name: CPU Temperature
    update_interval: 60s
    entity_category: diagnostic

binary_sensor:
  - platform: status
    name: Status
