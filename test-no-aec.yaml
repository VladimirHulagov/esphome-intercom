# Minimal test: intercom_api WITHOUT esp_aec
# Verifies issue #15 fix — intercom_api no longer depends on esp_aec component

substitutions:
  name: test-no-aec
  friendly_name: Test No AEC

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"

psram:
  mode: quad
  speed: 80MHz

api:
  on_client_connected:
    - lambda: 'id(intercom).publish_entity_states();'

ota:
  - platform: esphome

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Only intercom_api — NO esp_aec, NO i2s_audio_duplex
external_components:
  - source: github://n-IA-hane/intercom-api
    components: [intercom_api]

i2s_audio:
  - id: i2s_mic_bus
    i2s_lrclk_pin: GPIO3
    i2s_bclk_pin: GPIO2
  - id: i2s_spk_bus
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO7

microphone:
  - platform: i2s_audio
    id: mic_component
    i2s_audio_id: i2s_mic_bus
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    channel: left

speaker:
  - platform: i2s_audio
    id: spk_component
    i2s_audio_id: i2s_spk_bus
    i2s_dout_pin: GPIO8
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit

# NO esp_aec block, NO aec_id
intercom_api:
  id: intercom
  mode: full
  microphone: mic_component
  speaker: spk_component
  ringing_timeout: 30s

button:
  - platform: template
    name: "Call"
    on_press:
      - intercom_api.call_toggle: intercom

switch:
  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      name: "Auto Answer"
      restore_mode: RESTORE_DEFAULT_ON

number:
  - platform: intercom_api
    intercom_api_id: intercom
    speaker_volume:
      name: "Speaker Volume"
    mic_gain:
      name: "Mic Gain"

text_sensor:
  - platform: homeassistant
    id: ha_active_devices
    entity_id: sensor.intercom_active_devices
    on_value:
      - intercom_api.set_contacts:
          id: intercom
          contacts_csv: !lambda 'return x;'
