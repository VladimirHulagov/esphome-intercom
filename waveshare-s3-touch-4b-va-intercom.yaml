# =============================================================================
# Touchscreen (GT911)
# =============================================================================
touchscreen:
  - platform: gt911
    id: touch
    i2c_id: internal_i2c
    on_touch:
      - lambda: |-
          ESP_LOGD("touch", "Touch: x=%d y=%d", touch.x, touch.y);
    update_interval: 20ms

# =============================================================================
# Display (ST7701 RGB 480x480)
#
# Strategy: ST7701Init custom component sends init commands via TCA9554
# bit-bang SPI (CS=EXIO0, MOSI=EXIO1, SCK=EXIO2, RST=EXIO7) in on_boot
# lambda at priority 600. Then st7701s takes over the RGB DPI peripheral —
# its SPI goes to dummy pins (GPIO47/48) so the real display isn't disturbed.
# cs_pin not needed (st7701s allows cs_pin_required=False).
# init_sequence: [] — no SPI init commands, our custom init already done.
# =============================================================================
display:
  - platform: st7701s
    id: main_display
    spi_id: dummy_spi
    init_sequence: []
    color_order: RGB
    pclk_pin: GPIO9
    de_pin: GPIO17
    hsync_pin: GPIO46
    vsync_pin: GPIO3
    hsync_pulse_width: 10
    hsync_back_porch: 10
    hsync_front_porch: 10
    vsync_pulse_width: 4
    vsync_back_porch: 4
    vsync_front_porch: 4
    dimensions:
      width: 480
      height: 480
    data_pins:
      - number: 40
      - number: 41
      - number: 42
      - number: 2
      - number: 1
      - number: 21
      - number: 8
      - number: 18
      - number: 45
      - number: 38
      - number: 39
      - number: 10
      - number: 11
      - number: 12
      - number: 13
      - number: 14
    update_interval: never
    auto_clear_enabled: false

lvgl:
  displays:
    - main_display
  touchscreens:
    - touch
  buffer_size: 10%
  color_depth: 16
  log_level: WARN
  pages:
    - id: initializing_page
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            text: "\xD0\x97\xD0\xB0\xD0\xB3\xD1\x80\xD1\x83\xD0\xB7\xD0\xBA\xD0\xB0..."
            text_color: 0x888888
            text_font: font_state
    - id: no_wifi_page
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            y: -20
            text: "\xD0\x9D\xD0\xB5\xD1\x82 WiFi"
            text_color: 0xFF4444
            text_font: font_state
        - label:
            align: CENTER
            y: 30
            text: "\xD0\x9E\xD0\xB6\xD0\xB8\xD0\xB4\xD0\xB0\xD0\xBD\xD0\xB8\xD0\xB5 \xD0\xBF\xD0\xBE\xD0\xB4\xD0\xBA\xD0\xBB\xD1\x8E\xD1\x87\xD0\xB5\xD0\xBD\xD0\xB8\xD1\x8F..."
            text_color: 0x888888
            text_font: font_text
    - id: no_ha_page
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            y: -20
            text: "\xD0\x9D\xD0\xB5\xD1\x82 Home Assistant"
            text_color: 0xFF8800
            text_font: font_state
        - label:
