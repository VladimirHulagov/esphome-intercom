# =============================================================================
# ESP32-S3 INTERCOM MINI VA - Voice Assistant + Intercom
# =============================================================================
# Combines voice_assistant + micro_wake_word with intercom_api.
# Uses standard i2s_audio (separate I2S buses: SPH0645 mic + MAX98357A speaker).
# Mixer speaker shares hardware speaker between VA, Media, and Intercom.
#
# HARDWARE:
#   - Board: ESP32-S3 Mini (4MB Flash, Quad PSRAM)
#   - Microphone: SPH0645 I2S MEMS (I2S_NUM_0) - has DC offset
#   - Speaker: MAX98357A I2S amplifier (I2S_NUM_1)
#   - LED: WS2812 RGB (GPIO21)
#
# GPIO PINOUT:
#   Microphone (SPH0645):   WS=GPIO3, SCK=GPIO2, SD=GPIO4
#   Speaker (MAX98357A):    LRC=GPIO6, BCLK=GPIO7, DIN=GPIO8
#   LED (WS2812):           DATA=GPIO21
# =============================================================================

substitutions:
  name: esp32-s3-mini-va-intercom
  friendly_name: ESP32-S3 Mini VA Intercom

  # ---- Remote mode (for users, just download and flash) ----
  assets_base: "https://github.com/n-IA-hane/esphome-intercom/raw/main/"
  # ---- Local mode (for development, clone repo first) ----
  # assets_base: ""

  # Wake word sensitivity (per-device tuning)
  wake_word_probability_cutoff: "0.60"
  wake_word_sliding_window_size: "6"

  # Microphone ID for package mute switch
  mic_id: mic_component

# =============================================================================
# Package: shared VA + Intercom state machine, callbacks, switches, buttons
# =============================================================================
packages:
  core:
    url: https://github.com/n-IA-hane/esphome-intercom
    file: packages/va_intercom.yaml
    ref: audio-core-v2

# =============================================================================
# ESPHome Base
# =============================================================================
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - delay: 1s

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: quad
  speed: 80MHz

# =============================================================================
# CONNECTIVITY
# =============================================================================
api:

ota:
  - platform: esphome

logger:
  hardware_uart: UART0
  level: INFO
  logs:
    intercom_api: INFO

network:
  enable_high_performance: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# =============================================================================
# EXTERNAL COMPONENTS
# =============================================================================
external_components:
  - source:
      type: git
      url: https://github.com/n-IA-hane/esphome-intercom
      ref: audio-core-v2
    components: [intercom_api, esp_aec]

# =============================================================================
# I2S AUDIO BUSES
# =============================================================================
i2s_audio:
  - id: i2s_mic_bus
    i2s_lrclk_pin: GPIO3
    i2s_bclk_pin: GPIO2
  - id: i2s_spk_bus
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO7

# =============================================================================
# MICROPHONE (SPH0645) - shared by MWW, VA, and Intercom
# =============================================================================
microphone:
  - platform: i2s_audio
    id: mic_component
    i2s_audio_id: i2s_mic_bus
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    channel: left

# =============================================================================
# SPEAKERS (mixer topology: media + TTS + intercom -> hw_speaker)
# =============================================================================
speaker:
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_spk_bus
    i2s_dout_pin: GPIO8
    dac_type: external
    i2s_mode: primary
    sample_rate: 16000
    bits_per_sample: 16bit
    timeout: never
    buffer_duration: 100ms

  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    source_speakers:
      - id: media_speaker_mix
        timeout: 10s
      - id: tts_speaker_mix
        timeout: 10s
      - id: intercom_speaker_mix
        timeout: 10s

  - platform: resampler
    id: media_speaker
    output_speaker: media_speaker_mix

  - platform: resampler
    id: tts_speaker
    output_speaker: tts_speaker_mix

  - platform: resampler
    id: intercom_speaker
    output_speaker: intercom_speaker_mix

# =============================================================================
# MEDIA PLAYER
# =============================================================================
media_player:
  - platform: speaker
    id: speaker_media_player
    name: "Media Player"
    media_pipeline:
      speaker: media_speaker
      format: FLAC
      sample_rate: 16000
      num_channels: 1
    announcement_pipeline:
      speaker: tts_speaker
      format: FLAC
      sample_rate: 16000
      num_channels: 1
    files:
      - id: intercom_ringing_sound
        file: ${assets_base}sounds/ringtone.flac
    on_announcement:
      - script.execute: update_status
    on_play:
      - script.execute: update_status
    on_pause:
      - media_player.stop:
      - delay: 500ms
      - script.execute: update_status
    on_idle:
      - delay: 200ms
      - script.execute: update_status

# =============================================================================
# AEC (Acoustic Echo Cancellation)
# =============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 8
  mode: voip_high_perf

# =============================================================================
# WAKE WORD + VOICE ASSISTANT (hardware config; callbacks from package)
# =============================================================================
micro_wake_word:
  microphone: mic_component
  models:
    - model: "wakewords/hey_trowyayoh.json"
      probability_cutoff: ${wake_word_probability_cutoff}
      sliding_window_size: ${wake_word_sliding_window_size}

voice_assistant:
  microphone: mic_component
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

# =============================================================================
# INTERCOM API (hardware config; callbacks from package)
# =============================================================================
intercom_api:
  mode: full
  microphone: mic_component
  speaker: intercom_speaker
  dc_offset_removal: true
  processor_id: aec_processor
  ringing_timeout: 30s

# =============================================================================
# SWITCHES (device-specific)
# =============================================================================
switch:
  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: "Auto Answer"
      restore_mode: RESTORE_DEFAULT_ON
    aec:
      id: aec_switch
      name: "Echo Cancellation"
      restore_mode: RESTORE_DEFAULT_ON

# =============================================================================
# NUMBERS
# =============================================================================
number:
  - platform: intercom_api
    intercom_api_id: intercom
    speaker_volume:
      id: speaker_volume
      name: "Speaker Volume"
    mic_gain:
      id: mic_gain
      name: "Mic Gain"

# =============================================================================
# STATUS LED (WS2812 RGB on GPIO21)
# =============================================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    icon: "mdi:led-on"
    pin: GPIO21
    chipset: WS2812
    num_leds: 1
    rgb_order: RGB
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - strobe:
          name: "Ringing"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
            - state: false
              duration: 250ms
      - strobe:
          name: "Calling"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 50%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms

# =============================================================================
# LED logic (extends package placeholder)
# =============================================================================
script:
  - id: !extend update_led
    then:
      - lambda: |-
          static int last = -2;
          int t = id(g_applied_led);
          if (t == last) return;
          last = t;
          auto *led = id(status_led);
          switch (t) {
            case 1:  // Both muted: red slow pulse
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.4f).set_effect("Slow Pulse").perform();
              break;
            case 2:  // Mic muted: red dim solid
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.3f).set_effect("None").perform();
              break;
            case 3:  // Speaker muted: orange dim solid
              led->turn_on().set_rgb(1.0f, 0.5f, 0.0f).set_brightness(0.3f).set_effect("None").perform();
              break;
            case 4:  // MWW recent / barge-in
            case 5:  // VA Listening
              led->turn_on().set_rgb(0.0f, 1.0f, 0.0f).set_brightness(0.7f).set_effect("Slow Pulse").perform();
              break;
            case 6:  // VA Thinking
              led->turn_on().set_rgb(1.0f, 0.55f, 0.0f).set_brightness(0.7f).set_effect("Fast Pulse").perform();
              break;
            case 7:  // VA Speaking
              led->turn_on().set_rgb(0.0f, 0.0f, 1.0f).set_brightness(1.0f).set_effect("None").perform();
              break;
            case 8:  // IC Ringing
              led->turn_on().set_effect("Ringing").perform();
              break;
            case 9:  // IC Outgoing
              led->turn_on().set_effect("Calling").perform();
              break;
            case 10: // IC Streaming
              led->turn_on().set_rgb(0.0f, 1.0f, 0.0f).set_brightness(1.0f).set_effect("None").perform();
              break;
            case 11: // VA Error
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.7f).set_effect("None").perform();
              break;
            case 12: // Media playing
              led->turn_on().set_rgb(0.0f, 1.0f, 0.0f).set_brightness(1.0f).set_effect("Fast Pulse").perform();
              break;
            default: // Off
              led->turn_off().perform();
              break;
          }

# =============================================================================
# DIAGNOSTICS
# =============================================================================
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: internal_temperature
    name: "CPU Temperature"
    update_interval: 60s
